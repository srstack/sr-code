<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>usher</title>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d1117">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="usher">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="sidebar-backdrop" aria-hidden="true"></div>
<aside id="sidebar">
  <h1 class="sidebar-brand"><a href="#/">usher</a></h1>
  <a href="#/chat/default" class="sidebar-mainchat">main chat</a>
  <div class="sidebar-section">
    <div class="sidebar-heading">
      <span>sessions <span id="sidebar-session-count" class="muted"></span></span>
      <a href="#/new" class="sidebar-new" title="new session" aria-label="new session">+</a>
    </div>
    <div id="sidebar-sessions"></div>
  </div>
  <a href="/logout" class="sidebar-logout" title="sign out">sign out</a>
</aside>
<div class="main-wrap">
  <header>
    <button id="mobile-toggle" class="mobile-toggle" aria-label="toggle sidebar" type="button">☰</button>
    <span id="subtitle" class="muted">discovered Claude Code sessions</span>
    <button id="render-mode-btn" class="render-mode" type="button" title="toggle markdown rendering"><span class="render-mode-prefix">render:</span><span id="render-mode-val">md</span></button>
  </header>
  <main id="root"></main>
</div>
<script src="/vendor/marked.umd.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
