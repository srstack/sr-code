<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SR Code</title>
<meta name="theme-color" content="#f5f5f7">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SR Code">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/theme.css">
</head>
<body>
<div id="sidebar-backdrop" aria-hidden="true"></div>
<aside id="sidebar">
  <h1 class="sidebar-brand"><a href="#/"><img src="/icons/icon.svg" alt="" class="brand-icon">SR Code</a> <button class="sidebar-toggle sidebar-collapse" id="sidebar-collapse" title="Close sidebar" type="button"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><line x1="5.2" y1="1" x2="5.2" y2="15"/></svg></button></h1>
  <a href="#/new" class="sidebar-newsession"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 2v12M2 8h12"/></svg>New session</a>
  <div class="sidebar-heading">
    <span>sessions <span id="sidebar-session-count" class="muted"></span></span>
  </div>
  <div class="sidebar-section">
    <div id="sidebar-pinned"></div>
    <div id="sidebar-sessions"></div>
  </div>
  <div class="sidebar-footer">
    <div id="settings-menu" class="settings-menu" hidden>
      <button id="notif-toggle" class="settings-item" type="button" hidden>Enable notifications</button>
      <a href="/totp" class="settings-item">Two-factor auth</a>
      <a href="/logout" class="settings-item settings-danger">Sign out</a>
    </div>
    <button id="settings-btn" class="settings-btn" type="button" title="settings">Settings</button>
  </div>
</aside>
<div id="sidebar-resizer" aria-hidden="true"></div>
<div class="main-wrap">
  <header>
    <button id="mobile-toggle" class="sidebar-toggle mobile-toggle" aria-label="Open sidebar" type="button"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><line x1="5.2" y1="1" x2="5.2" y2="15"/></svg></button>
    <span id="subtitle" class="muted">discovered sessions</span>
    <span class="render-pill" role="radiogroup" aria-label="render mode"><button id="render-pill-md" class="render-pill-opt" type="button" aria-pressed="true">md</button><button id="render-pill-raw" class="render-pill-opt" type="button" aria-pressed="false">raw</button></span>
  </header>
  <main id="root"></main>
</div>
<div id="kebab-popover" hidden role="menu"></div>
<script src="/vendor/marked.umd.js"></script>
<script type="module" src="/app.js"></script>
</body>
</html>
