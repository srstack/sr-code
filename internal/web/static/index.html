<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>usher</title>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d1117">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="usher">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="sidebar-backdrop" aria-hidden="true"></div>
<aside id="sidebar">
  <h1 class="sidebar-brand"><a href="#/">usher</a> <button class="sidebar-toggle sidebar-collapse" id="sidebar-collapse" title="Close sidebar" type="button"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><line x1="5.2" y1="1" x2="5.2" y2="15"/></svg></button></h1>
  <a href="#/chat/default" class="sidebar-mainchat"><svg class="mainchat-icon" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="3.5" cy="8" r="1.6"/><circle cx="12.5" cy="3.5" r="1.6"/><circle cx="12.5" cy="12.5" r="1.6"/><path d="M5.1 8h2.4M7.5 8l3.5-3.7M7.5 8l3.5 3.7"/></svg>Router</a>
  <div class="sidebar-heading">
    <span>sessions <span id="sidebar-session-count" class="muted"></span></span>
    <a href="#/new" class="sidebar-new" title="new session" aria-label="new session">+</a>
  </div>
  <div class="sidebar-section">
    <div id="sidebar-pinned"></div>
    <div id="sidebar-sessions"></div>
  </div>
  <div class="sidebar-footer">
    <div id="settings-menu" class="settings-menu" hidden>
      <button id="notif-toggle" class="settings-item" type="button" hidden>Enable notifications</button>
      <a href="/logout" class="settings-item settings-danger">Sign out</a>
    </div>
    <button id="settings-btn" class="settings-btn" type="button" title="settings">Settings</button>
  </div>
</aside>
<div class="main-wrap">
  <header>
    <button id="mobile-toggle" class="sidebar-toggle mobile-toggle" aria-label="Open sidebar" type="button"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><line x1="5.2" y1="1" x2="5.2" y2="15"/></svg></button>
    <span id="subtitle" class="muted">discovered sessions</span>
    <span class="render-pill" role="radiogroup" aria-label="render mode"><button id="render-pill-md" class="render-pill-opt" type="button" aria-pressed="true">md</button><button id="render-pill-raw" class="render-pill-opt" type="button" aria-pressed="false">raw</button></span>
  </header>
  <main id="root"></main>
</div>
<div id="kebab-popover" hidden role="menu"></div>
<script src="/vendor/marked.umd.js"></script>
<script type="module" src="/app.js"></script>
</body>
</html>
