<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SR Code — two-factor auth</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.55;
    background: #f9f9f9;
    color: #0d0d0d;
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 28px 30px;
    width: min(400px, 92vw);
  }
  h1 { margin: 0 0 6px; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .sub { color: #5d5d5d; font-size: 13px; margin-bottom: 20px; }
  #qr {
    display: grid;
    place-items: center;
    padding: 16px;
    background: #fff;
    border: 1px solid #efefef;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  #qr img, #qr canvas { display: block; }
  .key-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #8f8f8f;
    margin-bottom: 4px;
  }
  .key {
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
    font-size: 13px;
    background: #f4f4f5;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    padding: 8px 12px;
    word-break: break-all;
    user-select: all;
    margin-bottom: 20px;
  }
  .row { display: flex; gap: 10px; }
  button, .btn {
    display: inline-block;
    padding: 9px 16px;
    border-radius: 999px;
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
  }
  .btn-primary { background: #0d0d0d; color: #fff; border: none; flex: 1; }
  .btn-primary:hover { background: #2f2f2f; }
  .btn-danger {
    background: transparent;
    color: #dc2626;
    border: 1px solid #fecaca;
  }
  .btn-danger:hover { background: #fef2f2; }
  form { margin: 0; }
</style>
</head>
<body>
<div class="card">
  <h1>Two-factor auth</h1>
  <div class="sub">Scan this QR code with your authenticator app (Google Authenticator, Authy, 1Password…), then sign in with the 6-digit code it shows.</div>
  <div id="qr"></div>
  <div class="key-label">manual entry key</div>
  <div class="key">{{.Secret}}</div>
  <div class="row">
    <a class="btn btn-primary" href="#/">Done</a>
    <form method="post" action="/totp/remove" onsubmit="return confirm('Remove two-factor auth? Every device will be signed out.')">
      <button class="btn btn-danger" type="submit">Remove</button>
    </form>
  </div>
</div>
<script src="/vendor/qrcode.js"></script>
<script>
  var el = document.getElementById('qr');
  var qr = qrcode(0, 'M');
  qr.addData({{.URI}});
  qr.make();
  el.innerHTML = qr.createImgTag(5, 8);
</script>
</body>
</html>
