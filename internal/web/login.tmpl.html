<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>usher — sign in</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: dark light; }
  body {
    font: 14px/1.4 ui-sans-serif, system-ui, sans-serif;
    background: #14171c;
    color: #d5dae0;
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
  }
  form {
    background: #1c2027;
    border: 1px solid #2a3038;
    border-radius: 8px;
    padding: 24px 28px;
    width: min(360px, 90vw);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  }
  h1 {
    margin: 0 0 18px;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  label { display: block; margin-bottom: 6px; color: #8a93a0; font-size: 12px; }
  input[type=password] {
    width: 100%;
    box-sizing: border-box;
    padding: 9px 10px;
    background: #0f1217;
    border: 1px solid #2a3038;
    border-radius: 5px;
    color: inherit;
    font: inherit;
  }
  input[type=password]:focus { outline: none; border-color: #4a90e2; }
  button {
    margin-top: 14px;
    width: 100%;
    padding: 9px 14px;
    background: #4a90e2;
    border: none;
    border-radius: 5px;
    color: white;
    font: inherit;
    cursor: pointer;
  }
  button:hover { background: #5ea0ee; }
  .err {
    margin-top: 12px;
    padding: 8px 10px;
    background: #3a1e22;
    border: 1px solid #5a2a30;
    border-radius: 4px;
    color: #f0a8af;
    font-size: 13px;
  }
</style>
</head>
<body>
<form method="post" action="/login" autocomplete="off">
  <h1>usher</h1>
  <label for="password">password</label>
  <input id="password" type="password" name="password" autofocus required>
  <input type="hidden" name="next" value="{{.Next}}">
  <button type="submit">sign in</button>
  {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
</form>
</body>
</html>
