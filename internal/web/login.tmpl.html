<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SR Code — sign in</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    background: #f9f9f9;
    color: #0d0d0d;
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { width: min(360px, 90vw); }
  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .brand img { width: 34px; height: 34px; border-radius: 8px; }
  form {
    background: #ffffff;
    border: 1px solid #e5e5e5;
    border-radius: 14px;
    padding: 28px;
    box-sizing: border-box;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  label {
    display: block;
    margin-bottom: 8px;
    color: #5d5d5d;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  input[type=password] {
    width: 100%;
    box-sizing: border-box;
    padding: 11px 14px;
    background: #f4f4f5;
    border: 1px solid #d9d9d9;
    border-radius: 10px;
    color: #0d0d0d;
    font: inherit;
    font-size: 16px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  input[type=password]:focus {
    outline: none;
    border-color: #0d0d0d;
    background: #fff;
  }
  input[name=code] {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    background: #f4f4f5;
    border: 1px solid #d9d9d9;
    border-radius: 10px;
    color: #0d0d0d;
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
    font-size: 26px;
    letter-spacing: 0.45em;
    text-align: center;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  input[name=code]:focus {
    outline: none;
    border-color: #0d0d0d;
    background: #fff;
  }
  .hint {
    margin: 0 0 16px;
    color: #8f8f8f;
    font-size: 13px;
    text-align: center;
  }
  button {
    margin-top: 18px;
    width: 100%;
    padding: 11px 14px;
    background: #0d0d0d;
    border: none;
    border-radius: 10px;
    color: white;
    font: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button:hover { background: #2f2f2f; }
  .err {
    margin-top: 14px;
    padding: 10px 14px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 10px;
    color: #991b1b;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><img src="/icons/icon.svg" alt="">SR Code</div>
  <form method="post" action="/login" autocomplete="off">
    {{if .TOTP}}
      <label for="code">authenticator code</label>
      <input id="code" type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" placeholder="······" autofocus required>
      <div class="hint">enter the 6-digit code from your authenticator app</div>
    {{else}}
      <label for="password">password</label>
      <input id="password" type="password" name="password" autofocus required>
    {{end}}
    <input type="hidden" name="next" value="{{.Next}}">
    <button type="submit">sign in</button>
    {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
  </form>
</div>
</body>
</html>
